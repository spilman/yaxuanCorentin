<pre class="yaxuanPoemChinese">
<b>读《金瓶梅》</b>

几个月没碰《金瓶梅》
打开书签标记的第六十一回继续读
还是九月初九，越读越奇怪
瓶儿怎么就活过来了
然后才意识到应该从第六十七回继续读
读冬天，初雪，瓶儿入梦
读西门庆的新欢，读他有情有义又忘恩负义的
本来面貌，立刻就回到了那个世界里去
纸上的时差最好追
翻几页就又是一个季节
再翻几页就连西门庆也死期将近
但只要再往回翻谁都能活过来
书一合上，只要是停在热闹的地方就能一直热闹下去
“生旦净丑一齐搬出”
就好像从来没有人死过
都有依据又都没有依据
其他的世界历史玩笑或审判与这一页暂时无关

2025.11.16

</pre>
