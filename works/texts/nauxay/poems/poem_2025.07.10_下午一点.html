<b>下午一点</b>

从梦里醒来
已经是下午一点了
睁开眼睛，闭上，再睁开
就这样做了奇怪的梦
梦里有会跳跃的紫色
有边走路边说话的钱
然后我竟然以为我们都是自由的
直到我睁开眼睛，闭上，再睁开
看见窗外的夏天，三十五度
一个男人坐在树荫下乘凉
他左腕上的手表也指向下午一点
好像时间和梦一样坚硬
没有一点犹豫
没有缝隙可钻
2025.07.10
