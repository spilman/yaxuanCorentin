<pre class="yaxuan-poem-chinese">
<b>咕噜咕噜</b>

交换戒指前
Jérémie说
今后还是会继续
在Jeanne喝水时
给她配音
咕噜咕噜
心里跟着默念了一声
咕噜咕噜
好像就要听到
一个脆弱又坚实的，秩序
在接触水的一瞬间
咕噜咕噜
愈浅愈深
愈近愈远

2025.07.26

</pre>
