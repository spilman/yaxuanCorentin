<pre class="yaxuan-poem-chinese">
<b>那些无法想象的事</b>

四个小时的慢速火车
从巴黎回雷恩
一路上经过无数田野
空荡荡的，几乎一个人影也没有
突然间出现一座房子
放眼望去周围只有一条路，没有邻居
立刻就要想象这房子里的生活
可又怎么能想象
只是坐在移动的火车里
在一刹那间晃荡着看见
立刻就要以为，猜测，假设
陶醉于误会
那些无法想象的事

2025.07.23

</pre>
