<b>朋友</b>

晚饭后出门散步
天还亮着，刚下过雨
三个小朋友在公园的入口
捡落叶，一片片往天上扔
哪怕都还是潮湿的，也不管
想起小学，不那么自然地
甚至有些刻意地想起
大概是四年级，在东面的教学楼
三楼还是四楼的楼道里
和两个当时最要好的朋友一起
挤在一扇小窗边，朝楼底下扔叶子
一人一片，精心挑选的
新鲜叶子，在空中飘
那样就算是结拜了
认定，从那一刻起
我们成为了永远的朋友
现在回过头看，原来
永远，有一个如此具体的开始
已经持续了整整十九年
哪怕它从来，也不和我说话

2025.09.19
